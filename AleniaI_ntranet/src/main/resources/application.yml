spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://localhost:5432/iberia_intranet
    username: postgres
    password: 123456789
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET client_encoding = 'UTF8'"
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true
    ignore-missing-migrations: true
    validate-on-migrate: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

iberia:
  app:
    jwtSecret: c2VjcmV0S2V5TXVzdEJlTG9uZ0Vub3VnaFRvU2VjdXJlVGhlVG9rZW5BbGdvcml0aG1UaGlzSXNKdXN0QURlZmF1bHRGb3JEZXZQVXJWB3Nlc09ubHk=
    jwtExpirationMs: 86400000 # 24 hours
