<div class="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white shadow-sm rounded-lg p-6">
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-900">Create IT Support Ticket</h1>
                <p class="mt-1 text-sm text-gray-600">Submit a new IT support request</p>
            </div>

            <form [formGroup]="ticketForm" (ngSubmit)="createTicket()">
                <!-- Title -->
                <div class="mb-4">
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">
                        Title <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="title" formControlName="title"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Brief description of the issue" />
                    <div *ngIf="ticketForm.get('title')?.touched && ticketForm.get('title')?.errors"
                        class="text-red-600 text-sm mt-1">
                        <span *ngIf="ticketForm.get('title')?.errors?.['required']">Title is required</span>
                    </div>
                </div>

                <!-- Category and Priority -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label for="category" class="block text-sm font-medium text-gray-700 mb-1">
                            Category <span class="text-red-500">*</span>
                        </label>
                        <select id="category" formControlName="category"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                        </select>
                    </div>

                    <div>
                        <label for="priority" class="block text-sm font-medium text-gray-700 mb-1">
                            Priority <span class="text-red-500">*</span>
                        </label>
                        <select id="priority" formControlName="priority"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option *ngFor="let pri of priorities" [value]="pri">{{ pri }}</option>
                        </select>
                    </div>
                </div>

                <!-- Description -->
                <div class="mb-4">
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-1">
                        Description <span class="text-red-500">*</span>
                    </label>
                    <textarea id="description" formControlName="description" rows="6"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Describe your issue in detail..."></textarea>
                    <div *ngIf="ticketForm.get('description')?.touched && ticketForm.get('description')?.errors"
                        class="text-red-600 text-sm mt-1">
                        <span *ngIf="ticketForm.get('description')?.errors?.['required']">Description is required</span>
                    </div>
                </div>

                <!-- Preferred Contact -->
                <div class="mb-4">
                    <label for="preferredContact" class="block text-sm font-medium text-gray-700 mb-1">
                        Preferred Contact (Optional)
                    </label>
                    <input type="email" id="preferredContact" formControlName="preferredContact"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="your.email@example.com" />
                </div>

                <!-- File Upload -->
                <div class="mb-6">
                    <label for="file" class="block text-sm font-medium text-gray-700 mb-1">
                        Attachment (Optional)
                    </label>
                    <input type="file" id="file" (change)="onFileSelected($event)" accept=".png,.jpg,.jpeg,.pdf,.txt"
                        class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
                    <p class="text-xs text-gray-500 mt-1">Max 5MB. Allowed: PNG, JPG, PDF, TXT</p>
                    <p *ngIf="selectedFile" class="text-sm text-gray-700 mt-1">Selected: {{ selectedFile.name }}</p>
                </div>

                <!-- Buttons -->
                <div class="flex justify-end space-x-3">
                    <button type="button" (click)="cancel()"
                        class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                        [disabled]="isSaving">
                        Cancel
                    </button>
                    <button type="submit"
                        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50"
                        [disabled]="isSaving || ticketForm.invalid">
                        <span *ngIf="!isSaving">Create Ticket</span>
                        <span *ngIf="isSaving">Creating...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
