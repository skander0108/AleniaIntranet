<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" (click)="close.emit()"></div>
    <div
        class="relative bg-white dark:bg-surface-dark rounded-xl shadow-xl w-full max-w-lg p-6 animate-in fade-in zoom-in duration-200">
        <h2 class="text-xl font-bold mb-4 text-text-main dark:text-white">New Leave Request</h2>

        <form [formGroup]="requestForm" (ngSubmit)="onSubmit()">
            <div class="space-y-4">
                <!-- Leave Type -->
                <div>
                    <label class="block text-sm font-medium text-text-muted mb-1">Leave Type</label>
                    <select formControlName="leaveTypeId"
                        class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent text-text-main dark:text-white focus:ring-2 focus:ring-primary/50">
                        <option value="" disabled>Select a type</option>
                        <option *ngFor="let type of leaveTypes" [value]="type.id">
                            {{ type.name }}
                        </option>
                    </select>
                </div>

                <!-- Dates -->
                <div class="grid grid-cols-2 gap-4">
                    <!-- Start Date -->
                    <div>
                        <label class="block text-sm font-medium text-text-muted mb-1">Start Date</label>
                        <div class="flex flex-col gap-2">
                            <input type="date" formControlName="startDate"
                                class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent text-text-main dark:text-white focus:ring-2 focus:ring-primary/50" />
                            <div class="flex gap-2">
                                <label class="flex items-center gap-2 cursor-pointer no-select">
                                    <input type="radio" formControlName="startPeriod" [value]="LeavePeriod.AM"
                                        class="text-primary focus:ring-primary" />
                                    <span class="text-sm text-text-main dark:text-white">Morning</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer no-select">
                                    <input type="radio" formControlName="startPeriod" [value]="LeavePeriod.PM"
                                        class="text-primary focus:ring-primary" />
                                    <span class="text-sm text-text-main dark:text-white">Afternoon</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- End Date -->
                    <div>
                        <label class="block text-sm font-medium text-text-muted mb-1">End Date</label>
                        <div class="flex flex-col gap-2">
                            <input type="date" formControlName="endDate"
                                class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent text-text-main dark:text-white focus:ring-2 focus:ring-primary/50" />
                            <div class="flex gap-2">
                                <label class="flex items-center gap-2 cursor-pointer no-select">
                                    <input type="radio" formControlName="endPeriod" [value]="LeavePeriod.AM"
                                        class="text-primary focus:ring-primary" />
                                    <span class="text-sm text-text-main dark:text-white">Morning</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer no-select">
                                    <input type="radio" formControlName="endPeriod" [value]="LeavePeriod.PM"
                                        class="text-primary focus:ring-primary" />
                                    <span class="text-sm text-text-main dark:text-white">Afternoon</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Duration Info -->
                <div class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-lg flex items-center gap-3">
                    <span class="material-symbols-outlined text-blue-600 dark:text-blue-400">schedule</span>
                    <div>
                        <p class="text-sm font-medium text-blue-900 dark:text-blue-100">Estimated Duration</p>
                        <p class="text-xs text-blue-700 dark:text-blue-300">
                            {{ estimatedDuration > 0 ? estimatedDuration + ' days' : 'Select dates' }}
                            (excl. weekends/holidays)
                        </p>
                    </div>
                </div>

                <!-- Reason -->
                <div>
                    <label class="block text-sm font-medium text-text-muted mb-1">Reason</label>
                    <textarea formControlName="reason" rows="3"
                        class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-transparent text-text-main dark:text-white focus:ring-2 focus:ring-primary/50"
                        placeholder="Why are you taking leave?"></textarea>
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-6">
                <button type="button" (click)="close.emit()"
                    class="px-4 py-2 rounded-lg text-text-muted hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    Cancel
                </button>
                <button type="submit" [disabled]="requestForm.invalid || isSubmitting || estimatedDuration <= 0"
                    class="px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-dark transition-colors disabled:opacity-50 flex items-center gap-2">
                    <span *ngIf="isSubmitting"
                        class="material-symbols-outlined animate-spin text-sm">progress_activity</span>
                    Submit Request
                </button>
            </div>
        </form>
    </div>
</div>
