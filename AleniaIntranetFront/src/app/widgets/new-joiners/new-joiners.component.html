<div
    class="bg-surface-light dark:bg-surface-dark p-6 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm h-full flex flex-col">
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-bold text-text-main dark:text-white">New Joiners</h3>
        <a routerLink="/joiners/manage"
            class="text-primary text-xs font-semibold hover:underline cursor-pointer">Manage</a>
    </div>

    <div *ngIf="loading" class="flex-1 flex justify-center items-center text-text-muted text-sm">
        Loading...
    </div>

    <div *ngIf="!loading && joiners.length === 0"
        class="flex-1 flex justify-center items-center text-text-muted text-sm">
        No new joiners recently.
    </div>

    <div *ngIf="!loading && joiners.length > 0" class="flex flex-col gap-4 overflow-y-auto max-h-[300px]">
        <div *ngFor="let person of joiners"
            class="flex items-center gap-3 p-2 hover:bg-gray-50 dark:hover:bg-gray-800/50 rounded-lg transition-colors">
            <div class="w-10 h-10 rounded-full bg-cover bg-center bg-gray-200 dark:bg-gray-700 border border-gray-100 dark:border-gray-600 flex-shrink-0"
                [style.background-image]="person.photoUrl ? 'url(' + person.photoUrl + ')' : ''">
                <span *ngIf="!person.photoUrl"
                    class="flex h-full w-full items-center justify-center text-xs font-bold text-gray-500">
                    {{ person.fullName.charAt(0) }}
                </span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-bold text-text-main dark:text-white truncate">{{ person.fullName }}</p>
                <p class="text-xs text-text-muted truncate">{{ person.jobTitle }}</p>
            </div>
            <div class="text-xs text-text-muted hidden sm:block truncate w-20 text-right">
                {{ person.department }}
            </div>
        </div>
    </div>
</div>
