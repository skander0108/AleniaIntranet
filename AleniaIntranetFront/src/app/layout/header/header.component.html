<header
    class="h-[72px] bg-surface-light dark:bg-surface-dark border-b border-[#f0f2f4] dark:border-gray-800 flex items-center justify-between px-6">
    <!-- Search Bar -->
    <div class="flex-1 max-w-xl">
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span
                    class="material-symbols-outlined text-text-muted group-focus-within:text-primary transition-colors">search</span>
            </div>
            <input
                class="block w-full pl-10 pr-3 py-2.5 border-none rounded-lg leading-5 bg-[#f0f2f4] dark:bg-gray-800 text-text-main dark:text-white placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all sm:text-sm"
                placeholder="Search for people, documents, or news..." type="text" (input)="onSearchChange($event)"
                (keydown.enter)="onSearchSubmit()" />
            <div class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none">
                <span
                    class="text-xs text-gray-400 border border-gray-300 dark:border-gray-600 rounded px-1.5 py-0.5">⌘K</span>
            </div>
        </div>
    </div>
    <!-- Right Header Actions -->
    <div class="flex items-center gap-4 ml-6">
        <app-notification-popover></app-notification-popover>
        <button class="p-2 text-text-muted hover:text-primary hover:bg-primary/5 rounded-full transition-colors"
            (click)="toggleDarkMode()" [title]="isDarkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
            <span class="material-symbols-outlined">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
        </button>
        <button class="p-2 text-text-muted hover:text-primary hover:bg-primary/5 rounded-full transition-colors">
            <span class="material-symbols-outlined">apps</span>
        </button>
        <div class="h-8 w-px bg-gray-200 dark:bg-gray-700 mx-1"></div>
        <div *ngIf="authService.currentUser$ | async as user" class="flex items-center gap-2">
            <div
                class="flex items-center gap-3 pl-2 pr-1 py-1 rounded-full hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors cursor-pointer">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-semibold text-text-main dark:text-white">{{ user.fullName }}</p>
                    <p class="text-xs text-text-muted">{{ user.email }}</p>
                </div>
                <div
                    class="h-9 w-9 rounded-full bg-primary/10 text-primary flex items-center justify-center font-bold text-lg border-2 border-white dark:border-gray-700 shadow-sm">
                    {{ user.fullName.charAt(0).toUpperCase() }}
                </div>
            </div>
            <button (click)="authService.logout()"
                class="p-2 text-text-muted hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition-colors"
                title="Logout">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </div>
</header>
